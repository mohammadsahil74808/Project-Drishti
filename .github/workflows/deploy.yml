name: SentinelX Catalyst Custom Runtime CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/sentinelx-backend:latest
            ${{ env.DOCKERHUB_USERNAME }}/sentinelx-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_USERNAME }}/sentinelx-backend:buildcache
          cache-to: type=registry,ref=${{ env.DOCKERHUB_USERNAME }}/sentinelx-backend:buildcache,mode=max

      - name: Build and Push AI Engine Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-engine
          file: ./ai-engine/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/sentinelx-ai-engine:latest
            ${{ env.DOCKERHUB_USERNAME }}/sentinelx-ai-engine:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_USERNAME }}/sentinelx-ai-engine:buildcache
          cache-to: type=registry,ref=${{ env.DOCKERHUB_USERNAME }}/sentinelx-ai-engine:buildcache,mode=max

      - name: Deployment Instructions
        run: |
          echo "Images successfully pushed to Docker Hub!"
          echo "To deploy to Zoho Catalyst AppSail:"
          echo "1. Ensure 'YOUR_DOCKERHUB_USERNAME' in catalyst.json is updated to your actual username."
          echo "2. Run: catalyst deploy --only appsail"
          echo "   (Alternatively, use the Catalyst Console to pull the latest images directly from Docker Hub integrations)."
