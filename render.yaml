# SentinelX AI — Render.com Infrastructure as Code
services:
  - type: web
    name: sentinelx-ai-engine
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./ai-engine/Dockerfile
    dockerContext: ./ai-engine
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHONUNBUFFERED
        value: "1"
